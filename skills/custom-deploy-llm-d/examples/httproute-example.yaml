apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-inference  # Your HTTPRoute name (e.g., llm-d-{model})
  namespace: your-namespace  # Your deployment namespace
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: infra-inference-gateway  # Gateway name from llm-d-infra chart (e.g., infra-{release}-inference-gateway)
      namespace: your-namespace  # Gateway namespace (typically same as HTTPRoute)
  rules:
    - backendRefs:
        - group: inference.networking.k8s.io  # Use inference.networking.k8s.io for InferencePool backends
          kind: InferencePool
          name: gaie-epp  # InferencePool name from inferencepool chart (e.g., gaie-{release})
          port: 8000  # EPP service port (typically 8000)
      timeouts:
        backendRequest: 0s  # 0s = no timeout for long-running inference
        request: 0s  # 0s = no timeout for client requests
      matches:
        - path:
            type: PathPrefix
            value: /  # Route all paths (/, /v1/*, etc.)

