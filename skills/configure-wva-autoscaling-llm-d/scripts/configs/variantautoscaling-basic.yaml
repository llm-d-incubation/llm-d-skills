apiVersion: llmd.ai/v1alpha1
kind: VariantAutoscaling
metadata:
  name: <model-name>-autoscaler
  namespace: <namespace>
  labels:
    # REQUIRED: Accelerator label for WVA to process this resource
    inference.optimization/acceleratorName: nvidia
spec:
  scaleTargetRef:
    kind: Deployment
    name: <deployment-name>
  modelID: "<vendor>/<model-name>"
  variantCost: "10.0"  # Cost per replica (for multi-variant optimization)

